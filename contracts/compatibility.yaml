  - kind: schema
    id: schema/input/base.template.create.v1.json
    change_type: patch
    current: contracts/schema/input/base.template.create.v1.json
    baseline: contracts/schema/input/base.template.create.v1.json
  - kind: schema
    id: schema/input/base.template.query.v1.json
    change_type: patch
    current: contracts/schema/input/base.template.query.v1.json
    baseline: contracts/schema/input/base.template.query.v1.json
  - kind: schema
    id: schema/output/base.template.create.v1.json
    change_type: patch
    current: contracts/schema/output/base.template.create.v1.json
    baseline: contracts/schema/output/base.template.create.v1.json
  - kind: schema
    id: schema/output/base.template.query.v1.json
    change_type: patch
