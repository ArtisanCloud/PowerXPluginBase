id: com.powerx.plugins.note
name: Note Note Plugin
version: 0.1.0
description: A Note management plugin for PowerX

# 后端配置
backend:
  entry: backend/bin/plugin
  port: 8091
  health: /healthz

# 路由配置
routes:
  basePath: /v1 # 插件自身 API 前缀
  adminManifest: /api/v1/admin/manifest # 管理端清单接口
  rbac: /api/v1/admin/rbac # RBAC 信息接口

# 权限定义
permissions:
  - resource: note:note
    actions: [read, create, update, delete]

# 菜单定义
menus:
  - id: "note"
    title: "menu.note"
    icon: "i-heroicons-clipboard-document-check"
    path: "/plugins/note"
    order: 20
    children:
      - id: "note.notes"
        title: "menu.note.notes"
        icon: "i-heroicons-list-bullet"
        path: "/plugins/note/notes"
        order: 1
      # sprint 菜单已移除

# 静态资源
assets:
  webAdminPath: web-admin/.output # 前端产物路径（可选）

# Agent 能力注册
agents:
  - id: "note.assistant"
    plugin_id: "com.powerx.plugins.note"
    name: "Note 助理"
    description: "创建/分配任务，团队协作"
    default_tools: ["note.note.create", "note.note.query"]

# 工具注册
tools:
  - id: "note.note.create"
    plugin_id: "com.powerx.plugins.note"
    name: "创建任务"
    description: "创建一个新的 Note 任务"
    transport: "http"
    endpoint: "/api/v1/notes"
    method: "POST"
    rbac_resource: "note:note"
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: "任务标题"
        description:
          type: string
          description: "任务描述"
        assignee:
          type: integer
          description: "分配给的用户ID"
        status:
          type: string
          enum: ["todo", "in_progress", "done"]
          description: "任务状态"
      required: ["title"]
    output_schema:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

  - id: "note.note.query"
    plugin_id: "com.powerx.plugins.note"
    name: "查询任务"
    description: "查询 Note 任务列表"
    transport: "http"
    endpoint: "/api/v1/notes"
    method: "GET"
    rbac_resource: "note:note"
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "按状态过滤"
        assignee:
          type: integer
          description: "按分配人过滤"
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    output_schema:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              status:
                type: string
              assignee:
                type: integer
              created_at:
                type: string
        pagination:
          type: object

# 工作流注册（已移除与 Sprint 相关的工作流）
