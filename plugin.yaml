# plugin.yaml 是 PowerX 插件管理器读取的 Manifest，声明插件固定的元信息与能力。
# 请勿在此写入环境相关的地址、口令等敏感配置；推荐放到 backend/etc/config.yaml 或部署环境变量中。
id: com.powerx.plugins.base
name: Base Note Plugin
version: 0.1.0
description: "PowerX 基础任务管理插件，提供任务、权限与 Agent 能力"
corex_version: ">=0.6.0"

runtime:
  kind: process
  entry: backend/bin/plugin
  env:
    CONFIG_PATH: ${PX_PLUGIN_CONFIG_DIR:-./backend/etc} # 告诉插件进程到何处加载 config.yaml/host-values.yaml
    PX_BIND_ADDR: ${PX_BIND_ADDR:-:8091}
    PX_LOG_LEVEL: ${PX_LOG_LEVEL:-info}
    PX_DEV_MODE: ${PX_DEV_MODE:-0}
  health:
    http: /healthz
    interval: 10s
    timeout: 3s

backend:
  entry: backend/bin/plugin
  port: 8091
  health: /healthz

endpoints:
  http_base_path: /api/v1
  grpc:
    enabled: false

frontend:
  admin:
    kind: static
    static_dir: web-admin/.output/public
    menus:
      - id: base
        title: menu.base
        icon: i-heroicons-clipboard-document-check
        path: /plugins/base
        order: 20
        slot: group.plugins
        required_policies: [base:note:read]
        children:
          - id: base.dashboard
            title: menu.base.dashboard
            icon: i-heroicons-squares-2x2
            path: /plugins/base/dashboard
            order: 1
          - id: base.notes
            title: menu.base.notes
            icon: i-heroicons-list-bullet
            path: /plugins/base/notes
            order: 2

routes:
  basePath: /api/v1
  adminManifest: /api/v1/admin/manifest
  rbac: /api/v1/admin/rbac

rbac:
  resources:
    - resource: base:note
      actions: [read, create, update, delete]
    - resource: base:report
      actions: [read]

permissions:
  - resource: base:note
    actions: [read, create, update, delete]
  - resource: base:report
    actions: [read]

menus:
  - id: plugins.base
    title: menu.base
    icon: i-heroicons-clipboard-document-check
    path: /plugins/base
    order: 20
    slot: group.plugins
    required_policies: [base:note:read]
    children:
      - id: plugins.base.dashboard
        title: menu.base.dashboard
        icon: i-heroicons-squares-2x2
        path: /plugins/base/dashboard
        order: 1
      - id: plugins.base.notes
        title: menu.base.notes
        icon: i-heroicons-list-bullet
        path: /plugins/base/notes
        order: 2

agents:
  - id: base.assistant
    plugin_id: com.powerx.plugins.base
    name: Base 助理
    description: "智能任务助手，协助创建与查询 Note"
    default_tools:
      - base.note.create
      - base.note.query

# 工具清单侧重声明接口契约，真实业务参数通过 config.yaml 或环境变量注入
# 例如 PX_PLUGIN_HTTP_BASE 可在运行时指向宿主反代出来的前缀。
tools:
  - id: base.note.create
    plugin_id: com.powerx.plugins.base
    name: 创建任务
    description: 创建一个新的 Base 任务
    transport: http
    endpoint: ${PX_PLUGIN_HTTP_BASE:-/api/v1}/notes
    method: POST
    rbac_resource: base:note
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: 任务标题
        description:
          type: string
          description: 任务描述
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
          description: 任务优先级
        assignee:
          type: integer
          description: 分配的用户 ID
        estimate:
          type: integer
          minimum: 1
          maximum: 100
          description: 估算点数
      required: [title]
    output_schema:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

  - id: base.note.query
    plugin_id: com.powerx.plugins.base
    name: 查询任务
    description: 查询 Base 任务列表
    transport: http
    endpoint: ${PX_PLUGIN_HTTP_BASE:-/api/v1}/notes
    method: GET
    rbac_resource: base:note
    input_schema:
      type: object
      properties:
        status:
          type: string
          enum: [todo, in_progress, done]
          description: 按状态过滤
        assignee:
          type: integer
          description: 按分配人过滤
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    output_schema:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              status:
                type: string
              assignee:
                type: integer
              created_at:
                type: string
                format: date-time
        pagination:
          type: object

assets:
  public_dir: ./web-admin/public
  webAdminPath: ./web-admin/.output

checksums:
  package_sha256: "" # 打包后由 CI/发布流程写入

signature:
  enabled: false

metadata:
  author: PowerX Team
  category: productivity
  tags: [base, note, task-management]
  icon: i-heroicons-clipboard-document
  homepage: https://powerx.dev/plugins/base
  license: MIT
