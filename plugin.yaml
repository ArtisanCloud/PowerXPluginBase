# plugin.yaml 是 PowerX 插件管理器读取的 Manifest，声明插件固定的元信息与能力。
# 请勿在此写入环境相关的地址、口令等敏感配置；推荐放到 backend/etc/config.yaml 或部署环境变量中。
id: com.powerx.plugins.base
name: Base template Plugin
version: 0.6.0
description: "PowerX 基础任务管理插件，提供任务、权限与 Agent 能力"
corex_version: ">=0.6.0"
security_baseline_version: "2025.10"
data_usage:
  - purpose: "tenant_data_classification"
    type: "pii_inventory"
    retention: "365d"
    requires_consent: true
  - purpose: "toolgrant_audit_trail"
    type: "operational_log"
    retention: "90d"
    requires_consent: true
  - purpose: "security_advisory_distribution"
    type: "security_notification"
    retention: "365d"
    requires_consent: false
  - purpose: "integration_webhook_delivery"
    type: "operational_log"
    retention: "30d"
    requires_consent: true
  - purpose: "integration_secret_metadata"
    type: "configuration"
    retention: "365d"
    requires_consent: false

runtime:
  kind: process
  entry: backend/bin/plugin
  env:
    POWERX_BIND_ADDR: ${POWERX_BIND_ADDR:-:8086}
    POWERX_PROXY: "1"                                # 被 PowerX 托管时应为 1（宿主也可注入）
    POWERX_PLUGIN_ID: "com.powerx.plugins.base"      # 也可让宿主注入
    POWERX_SECURITY_JWT_ISSUER: "powerx-auth"        # 必须与宿主一致
    POWERX_SECURITY_JWT_AUDIENCE: "plugin:com.powerx.plugins.base"
    POWERX_SECURITY_JWT_SECRET: "${POWERX_AUTH_JWTSECRET}"   # 由宿主用真实 JWTSecret 渲染
    # 可选：Signed-Context（如启用）
    # POWERX_SECURITY_CTX_HMAC_SECRET: "${POWERX_CTX_HMAC_SECRET}"
    POWERX_DEBUG_TRAFFIC: "${POWERX_DEBUG_TRAFFIC:-1}"
    
  health:
    http: /healthz
    interval: 10s
    timeout: 3s

backend:
  entry: backend/bin/plugin
  port: 8086
  health: /healthz

endpoints:
  http_base_path: /api/v1

frontend:
  admin:
    kind: process
    process:
      entry: node
      args: ["./web-admin/.output/server/index.mjs"]
      env:
        NODE_ENV: production
        NITRO_HOST: 127.0.0.1     # 可省略，Enable 会补
        POWERX_PROXY: "1"         # 可省略，Enable 会补
      health:
        http: /healthz            # 推荐在 Nuxt 里加 app/server/routes/healthz.ts 返回 'ok'
        interval: 5s
        timeout: 2s
    static_dir: web-admin/.output/public   # 可选兜底（Nuxt 挂了仍能喂文件）
    i18n:
      dir: web-admin/i18n
      format: i18next
      default_namespace: menus
      namespaces:
        - menus
      locales:
        - zh-CN
        - en
    menus:
      - id: plugins.base
        title: 基础插件
        title_i18n:
          namespace: menus
          key: menu.base.template
          default: Base Plugin
        icon: i-heroicons-clipboard-document-check
        path: /intro                # ⚠️ 原 /dashboard 改为 /intro
        route: intro                # ⚠️ 原 route: dashboard 改为 intro
        order: 20
        slot: group.plugins
        required_policies: [base:template:read]
        children:
          - id: plugins.base.intro  # ⚠️ 重命名（原 plugins.base.dashboard）
            title: PowerXPluginIntro
            title_i18n:
              namespace: menus
              key: menu.base.intro
              default: PowerX Plugin Intro
            icon: i-heroicons-information-circle
            path: /intro
            route: intro
            order: 1

          - id: plugins.base.templates
            title: 模版               # ⚠️ 原“笔记”改为“模版”
            title_i18n:
              namespace: menus
              key: menu.base.templates.title
              default: Templates
            icon: i-heroicons-clipboard-document-list
            path: /templates
            route: templates
            order: 2
            children:
              - id: plugins.base.templates.develop   # ⚠️ 原 overview -> develop
                title: 开发介绍
                title_i18n:
                  namespace: menus
                  key: menu.base.templates.develop
                  default: Templates Develop Intro
                icon: i-heroicons-document-text
                path: /templates/develop
                route: templates/develop
                order: 1

              - id: plugins.base.templates.crud      # ⚠️ 原 active -> crud
                title: 模版 CRUD
                title_i18n:
                  namespace: menus
                  key: menu.base.templates.crud
                  default: Templates CRUD
                icon: i-heroicons-wrench
                path: /templates/crud
                route: templates/crud
                order: 2

          - id: plugins.base.integration
            title: 集成中心
            title_i18n:
              namespace: menus
              key: menu.base.integration.title
              default: Integration Hub
            icon: i-heroicons-cube-transparent
            path: /integration/webhooks
            route: integration/webhooks
            order: 3
            required_policies: [integration.webhooks:read]
            children:
              - id: plugins.base.integration.webhooks
                title: Webhooks
                title_i18n:
                  namespace: menus
                  key: menu.base.integration.webhooks
                  default: Webhooks
                icon: i-heroicons-bolt
                path: /integration/webhooks
                route: integration/webhooks
                required_policies: [integration.webhooks:read]
              - id: plugins.base.integration.secrets
                title: Secrets
                title_i18n:
                  namespace: menus
                  key: menu.base.integration.secrets
                  default: Secrets
                icon: i-heroicons-key
                path: /integration/secrets
                route: integration/secrets
                required_policies: [integration.secrets:read]
              - id: plugins.base.integration.marketplace
                title: Marketplace Listings
                title_i18n:
                  namespace: menus
                  key: menu.base.integration.marketplace
                  default: Marketplace Listings
                icon: i-heroicons-building-storefront
                path: /integration/marketplace/listings
                route: integration/marketplace/listings
                required_policies: [marketplace.listings:read]
              - id: plugins.base.integration.marketplace.plans
                title: Pricing Plans
                title_i18n:
                  namespace: menus
                  key: menu.base.integration.marketplace.plans
                  default: Pricing Plans
                icon: i-heroicons-currency-dollar
                path: /integration/marketplace/plans
                route: integration/marketplace/plans
                required_policies: [marketplace.license:manage]
              - id: plugins.base.integration.marketplace.purchase
                title: Tenant Purchase
                title_i18n:
                  namespace: menus
                  key: menu.base.integration.marketplace.purchase
                  default: Tenant Purchase
                icon: i-heroicons-shopping-cart
                path: /integration/marketplace/purchase
                route: integration/marketplace/purchase
                required_policies: [marketplace.license:purchase]
              - id: plugins.base.integration.recommendation
                title: Recommendation Experiments
                title_i18n:
                  namespace: menus
                  key: menu.base.integration.recommendation
                  default: Recommendation Experiments
                icon: i-heroicons-beaker
                path: /integration/marketplace/recommendation
                route: integration/marketplace/recommendation
                required_policies: [marketplace.recommendation:read]
              - id: plugins.base.integration.insights
                title: Insights
                title_i18n:
                  namespace: menus
                  key: menu.base.integration.insights
                  default: Insights
                icon: i-heroicons-chart-bar-square
                path: /integration/insights
                route: integration/insights

          - id: plugins.base.operations
            title: 运营支持
            title_i18n:
              namespace: menus
              key: menu.base.operations.title
              default: Operations Center
            icon: i-heroicons-lifebuoy
            path: /operations/support
            route: operations/support
            order: 4
            required_policies: [operations.support:read]
            children:
              - id: plugins.base.operations.support
                title: Support Playbook
                title_i18n:
                  namespace: menus
                  key: menu.base.operations.support
                  default: Support Playbook
                icon: i-heroicons-book-open
                path: /operations/support
                route: operations/support
                required_policies: [operations.support:read]
              - id: plugins.base.operations.incidents
                title: Incident Center
                title_i18n:
                  namespace: menus
                  key: menu.base.operations.incidents
                  default: Incident Center
                icon: i-heroicons-exclamation-triangle
                path: /operations/incidents
                route: operations/incidents
                required_policies: [operations.incident:read]
              - id: plugins.base.operations.sla
                title: SLA Dashboard
                title_i18n:
                  namespace: menus
                  key: menu.base.operations.sla
                  default: SLA Dashboard
                icon: i-heroicons-chart-pie
                path: /operations/sla
                route: operations/sla
                required_policies: [operations.sla:read]
              - id: plugins.base.operations.dev_console
                title: Dev Console
                title_i18n:
                  namespace: menus
                  key: menu.base.operations.dev_console
                  default: Dev Console
                icon: i-heroicons-command-line
                path: /operations/dev-console
                route: operations/dev-console
                required_policies: [operations.plugin.admin:read]

routes:
  basePath: /api/v1
  adminManifest: /api/v1/admin/manifest
  rbac: /api/v1/admin/rbac
  operations:
    admin: /api/v1/admin/operations
  marketplace:
    admin: /api/v1/admin/marketplace
    public: /api/v1/marketplace
    checklist_graphql: /api/v1/admin/marketplace/checklist/graphql

rbac:
  resources:
    - resource: base:template
      actions: [read, create, update, delete]
    - resource: runtime.ops
      actions: [read, observe, manage]
    - resource: marketplace.listings
      actions: [read, write, review]
    - resource: marketplace.recommendation
      actions: [read, manage]
    - resource: marketplace.checklist
      actions: [read, trigger]
    - resource: marketplace.license
      actions: [read, purchase, manage]
    - resource: marketplace.revenue
      actions: [read, export]
    - resource: marketplace.usage
      actions: [view, observe]
    - resource: operations.support
      actions: [read, manage]
    - resource: operations.incident
      actions: [read, command]
    - resource: operations.sla
      actions: [read, manage, command]

events:
  produces:
    - topic: marketplace.license.renewal.scheduled
      description: "License 续费提醒已排程，供通知系统拉取"
    - topic: marketplace.license.renewal.due
      description: "续费任务触发执行事件，便于审计与监控"

permissions:
  - resource: base:template
    actions: [read, create, update, delete]
  - resource: runtime.ops
    actions: [read, observe, manage]
  - resource: marketplace.listings
    actions: [read, write, review]
  - resource: marketplace.recommendation
    actions: [read, manage]
  - resource: marketplace.checklist
    actions: [read, trigger]
  - resource: marketplace.license
    actions: [read, purchase, manage]
  - resource: marketplace.usage
    actions: [view, observe]
  - resource: marketplace.revenue
    actions: [read, export]
  - resource: operations.support
    actions: [read, manage]
  - resource: operations.incident
    actions: [read, command]
  - resource: operations.sla
    actions: [read, manage, command]
  - resource: operations.plugin.admin
    actions: [read, manage]
  - resource: operations.plugin.audit
    actions: [read, export]
  - resource: operations.plugin.ops
    actions: [read, execute]
  - resource: operations.plugin.admin
    actions: [read, manage]
  - resource: operations.plugin.audit
    actions: [read, export]
  - resource: operations.plugin.ops
    actions: [read, execute]

agents:
  - id: base.assistant
    plugin_id: com.powerx.plugins.base
    name: Base 助理
    description: "智能任务助手，协助创建与查询 Template"
    default_tools:
      - base.template.create
      - base.template.query

capabilities:
  provides:
    - id: base.template.create
      version: 1.0.0
      descriptor: contracts/capabilities/base.template.create.yaml
      schemas:
        input:
          - schema/input/base.template.create.v1.json
        output:
          - schema/output/base.template.create.v1.json
    - id: base.template.query
      version: 1.0.0
      descriptor: contracts/capabilities/base.template.query.yaml
      schemas:
        input:
          - schema/input/base.template.query.v1.json
        output:
          - schema/output/base.template.query.v1.json

# 工具清单侧重声明接口契约，真实业务参数通过 config.yaml 或环境变量注入
# 例如 POWERX_PLUGIN_HTTP_BASE 可在运行时指向宿主反代出来的前缀。
tools:
  - id: base.template.create
    plugin_id: com.powerx.plugins.base
    name: 创建任务
    description: 创建一个新的 Base 任务
    transport: http
    endpoint: ${POWERX_PLUGIN_HTTP_BASE:-/api/v1}/templates
    method: POST
    rbac_resource: base:template
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: 任务标题
        description:
          type: string
          description: 任务描述
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
          description: 任务优先级
        assignee:
          type: integer
          description: 分配的用户 ID
        estimate:
          type: integer
          minimum: 1
          maximum: 100
          description: 估算点数
      required: [title]
    output_schema:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

  - id: base.template.query
    plugin_id: com.powerx.plugins.base
    name: 查询任务
    description: 查询 Base 任务列表
    transport: http
    endpoint: ${POWERX_PLUGIN_HTTP_BASE:-/api/v1}/templates
    method: GET
    rbac_resource: base:template
    input_schema:
      type: object
      properties:
        status:
          type: string
          enum: [todo, in_progress, done]
          description: 按状态过滤
        assignee:
          type: integer
          description: 按分配人过滤
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    output_schema:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              status:
                type: string
              assignee:
                type: integer
              created_at:
                type: string
                format: date-time
        pagination:
          type: object

migrations:
  driver: go
  entry: backend/bin/migrate
  args: ["setup"]
  workdir: ./backend
  once: true
  timeout: 60s

assets:
  public_dir: ./web-admin/public
  webAdminPath: ./web-admin/.output

checksums:
  package_sha256: "" # 打包后由 CI/发布流程写入

signature:
  enabled: false

metadata:
  author: PowerX Team
  category: productivity
  tags: [base, template, task-management]
  icon: i-heroicons-clipboard-document
  homepage: https://powerx.dev/plugins/base
  license: MIT
