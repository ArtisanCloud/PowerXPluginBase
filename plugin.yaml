# plugin.yaml 是 PowerX 插件管理器读取的 Manifest，声明插件固定的元信息与能力。
# 请勿在此写入环境相关的地址、口令等敏感配置；推荐放到 backend/etc/config.yaml 或部署环境变量中。
id: com.powerx.plugins.base
name: Base Note Plugin
version: 0.1.0
description: "PowerX 基础任务管理插件，提供任务、权限与 Agent 能力"
corex_version: ">=0.6.0"

runtime:
  kind: process
  entry: backend/bin/plugin
  env:
    POWERX_BIND_ADDR: ${POWERX_BIND_ADDR:-:8091}
    POWERX_PROXY: "1"                                # 被 PowerX 托管时应为 1（宿主也可注入）
    POWERX_PLUGIN_ID: "com.powerx.plugins.base"      # 也可让宿主注入
    POWERX_SECURITY_JWT_ISSUER: "powerx-auth"        # 必须与宿主一致
    POWERX_SECURITY_JWT_AUDIENCE: "plugin:com.powerx.plugins.base"
    POWERX_SECURITY_JWT_SECRET: "${POWERX_AUTH_JWTSECRET}"   # 由宿主用真实 JWTSecret 渲染
    # 可选：Signed-Context（如启用）
    # POWERX_SECURITY_CTX_HMAC_SECRET: "${POWERX_CTX_HMAC_SECRET}"
    POWERX_DEBUG_TRAFFIC: "${POWERX_DEBUG_TRAFFIC:-1}"
    
  health:
    http: /healthz
    interval: 10s
    timeout: 3s

backend:
  entry: backend/bin/plugin
  port: 8091
  health: /healthz

endpoints:
  http_base_path: /api/v1

frontend:
  admin:
    kind: process
    process:
      entry: node
      args: ["./web-admin/.output/server/index.mjs"]
      env:
        NODE_ENV: production
        NITRO_HOST: 127.0.0.1     # 可省略，Enable 会补
        POWERX_PROXY: "1"         # 可省略，Enable 会补
      health:
        http: /healthz            # 推荐在 Nuxt 里加 app/server/routes/healthz.ts 返回 'ok'
        interval: 5s
        timeout: 2s
    static_dir: web-admin/.output/public   # 可选兜底（Nuxt 挂了仍能喂文件）
    i18n:
      dir: web-admin/i18n
      format: i18next
      default_namespace: menus
      namespaces:
        - menus
      locales:
        - zh-CN
        - en
    menus:
      - id: base
        title: 基础插件
        title_i18n:
          namespace: menus
          key: menu.base.note
          default: Base Plugin
        icon: i-heroicons-clipboard-document-check
        path: /dashboard
        route: dashboard
        order: 20
        slot: group.plugins
        required_policies: [base:note:read]
        children:
          - id: base.dashboard
            title: 仪表盘
            title_i18n:
              namespace: menus
              key: menu.base.dashboard
              default: Dashboard
            icon: i-heroicons-squares-2x2
            path: /dashboard
            route: dashboard
            order: 1
          - id: base.notes
            title: 笔记
            title_i18n:
              namespace: menus
              key: menu.base.notes.title
              default: Notes
            icon: i-heroicons-clipboard-document-list
            path: /notes
            route: notes
            order: 2
            children:
              - id: base.notes.overview
                title: 笔记总览
                title_i18n:
                  namespace: menus
                  key: menu.base.notes.overview
                  default: Notes Overview
                icon: i-heroicons-document-text
                path: /notes
                route: notes
                order: 1
              - id: base.notes.active
                title: 活跃笔记
                title_i18n:
                  namespace: menus
                  key: menu.base.notes.active
                  default: Active Notes
                icon: i-heroicons-play-circle
                path: /notes/active
                route: notes/active
                order: 2
          - id: base.reports
            title: 报表
            title_i18n:
              namespace: menus
              key: menu.base.reports.title
              default: Reports
            icon: i-heroicons-chart-bar
            path: /reports
            route: reports
            order: 3
            required_policies: [base:report:read]
            children:
              - id: base.reports.daily
                title: 日报表
                title_i18n:
                  namespace: menus
                  key: menu.base.reports.daily
                  default: Daily Report
                icon: i-heroicons-calendar-days
                path: /reports/daily
                route: reports/daily
                order: 1
              - id: base.reports.monthly
                title: 月报表
                title_i18n:
                  namespace: menus
                  key: menu.base.reports.monthly
                  default: Monthly Report
                icon: i-heroicons-calendar
                path: /reports/monthly
                route: reports/monthly
                order: 2

routes:
  basePath: /api/v1
  adminManifest: /api/v1/admin/manifest
  rbac: /api/v1/admin/rbac

rbac:
  resources:
    - resource: base:note
      actions: [read, create, update, delete]
    - resource: base:report
      actions: [read]

permissions:
  - resource: base:note
    actions: [read, create, update, delete]
  - resource: base:report
    actions: [read]

menus:
  - id: plugins.base
    title: 基础插件
    title_i18n:
      namespace: menus
      key: menu.base.note
      default: Base Plugin
    icon: i-heroicons-clipboard-document-check
    path: /dashboard
    route: dashboard
    order: 20
    slot: group.plugins
    required_policies: [base:note:read]
    children:
      - id: plugins.base.dashboard
        title: 仪表盘
        title_i18n:
          namespace: menus
          key: menu.base.dashboard
          default: Dashboard
        icon: i-heroicons-squares-2x2
        path: /dashboard
        route: dashboard
        order: 1
      - id: plugins.base.notes
        title: 笔记
        title_i18n:
          namespace: menus
          key: menu.base.notes.title
          default: Notes
        icon: i-heroicons-clipboard-document-list
        path: /notes
        route: notes
        order: 2
        children:
          - id: plugins.base.notes.overview
            title: 笔记总览
            title_i18n:
              namespace: menus
              key: menu.base.notes.overview
              default: Notes Overview
            icon: i-heroicons-document-text
            path: /notes
            route: notes
            order: 1
          - id: plugins.base.notes.active
            title: 活跃笔记
            title_i18n:
              namespace: menus
              key: menu.base.notes.active
              default: Active Notes
            icon: i-heroicons-play-circle
            path: /notes/active
            route: notes/active
            order: 2
      - id: plugins.base.reports
        title: 报表
        title_i18n:
          namespace: menus
          key: menu.base.reports.title
          default: Reports
        icon: i-heroicons-chart-bar
        path: /reports
        route: reports
        order: 3
        required_policies: [base:report:read]
        children:
          - id: plugins.base.reports.daily
            title: 日报表
            title_i18n:
              namespace: menus
              key: menu.base.reports.daily
              default: Daily Report
            icon: i-heroicons-calendar-days
            path: /reports/daily
            route: reports/daily
            order: 1
          - id: plugins.base.reports.monthly
            title: 月报表
            title_i18n:
              namespace: menus
              key: menu.base.reports.monthly
              default: Monthly Report
            icon: i-heroicons-calendar
            path: /reports/monthly
            route: reports/monthly
            order: 2

agents:
  - id: base.assistant
    plugin_id: com.powerx.plugins.base
    name: Base 助理
    description: "智能任务助手，协助创建与查询 Note"
    default_tools:
      - base.note.create
      - base.note.query

# 工具清单侧重声明接口契约，真实业务参数通过 config.yaml 或环境变量注入
# 例如 POWERX_PLUGIN_HTTP_BASE 可在运行时指向宿主反代出来的前缀。
tools:
  - id: base.note.create
    plugin_id: com.powerx.plugins.base
    name: 创建任务
    description: 创建一个新的 Base 任务
    transport: http
    endpoint: ${POWERX_PLUGIN_HTTP_BASE:-/api/v1}/notes
    method: POST
    rbac_resource: base:note
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: 任务标题
        description:
          type: string
          description: 任务描述
        priority:
          type: string
          enum: [low, medium, high, urgent]
          default: medium
          description: 任务优先级
        assignee:
          type: integer
          description: 分配的用户 ID
        estimate:
          type: integer
          minimum: 1
          maximum: 100
          description: 估算点数
      required: [title]
    output_schema:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

  - id: base.note.query
    plugin_id: com.powerx.plugins.base
    name: 查询任务
    description: 查询 Base 任务列表
    transport: http
    endpoint: ${POWERX_PLUGIN_HTTP_BASE:-/api/v1}/notes
    method: GET
    rbac_resource: base:note
    input_schema:
      type: object
      properties:
        status:
          type: string
          enum: [todo, in_progress, done]
          description: 按状态过滤
        assignee:
          type: integer
          description: 按分配人过滤
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    output_schema:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              status:
                type: string
              assignee:
                type: integer
              created_at:
                type: string
                format: date-time
        pagination:
          type: object

migrations:
  driver: go
  entry: backend/bin/migrate
  args: ["setup"]
  workdir: ./backend
  once: true
  timeout: 60s

assets:
  public_dir: ./web-admin/public
  webAdminPath: ./web-admin/.output

checksums:
  package_sha256: "" # 打包后由 CI/发布流程写入

signature:
  enabled: false

metadata:
  author: PowerX Team
  category: productivity
  tags: [base, note, task-management]
  icon: i-heroicons-clipboard-document
  homepage: https://powerx.dev/plugins/base
  license: MIT
