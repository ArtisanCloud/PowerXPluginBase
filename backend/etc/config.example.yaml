# PowerX Base Plugin Configuration - Example
# 此文件主要用于本地调试：复制为 backend/etc/config.yaml 后再修改。
# 在 PowerX 宿主环境中，请改为根据 config/schema.yaml 生成 config/host-values.yaml。

# 服务配置
server:
  bind_addr: ":8086" # 服务绑定地址
  log_level: "debug" # 开发环境建议使用 debug
  dev_mode: true # 开发模式

# 数据库配置
database:
  dsn: "postgres://powerx:powerx@localhost:5432/powerx?sslmode=disable"
  schema: "px_plugin_base"

# 运行时配置
runtime:
  run_migrate: true # 开发环境可以启用自动迁移

# Runtime Ops 默认配置（宿主安装时由 host-values.yaml 覆盖端口/资源等）
runtime_ops:
  heartbeat_seconds: 15
  heartbeat_misses: 3
  quota_window_minutes: 5
  restart_backoff_start_seconds: 5
  restart_backoff_max_seconds: 120
  log_retention_days: 7
  cpu_default: "500m"
  memory_default: "512Mi"
  network_profile: "standard"
  observability:
    loki_endpoint: ""
    tempo_endpoint: ""
  alerts:
    health_failure_rate: 0.5
    p95_latency_ms: 500
    error_rate: 0.05
    quota_usage: 0.9
    billing_anomaly: 0.2

# PowerX 上下文配置
context:
  # 开发模式下可填入本地假数据；生产环境由宿主自动注入。
  hmac_secret: "dev-hmac-secret"
  key_id: "dev"
  jwks_url: ""
  issuer: ""
  audience: ""
  ttl: "5m"

# 安全配置
security:
  enable_cors: true
  cors_origins:
    - "http://localhost:3036"
    - "http://localhost:3000"
    - "http://127.0.0.1:3036"
  rate_limit:
    enabled: false # 开发环境可关闭限流

# 监控配置
monitoring:
  metrics:
    enabled: true
    path: "/api/v1/admin/runtime/metrics"
  health_check:
    enabled: true

# 日志配置
logging:
  level: "debug"
  format: "text" # 开发环境使用文本格式更易读
  output: "stdout"


# 集成协议相关配置
integration:
  idempotency:
    provider: redis
    redis_url: redis://localhost:6379
    ttl_hours: 24
  envelope:
    payload_threshold_bytes: 1048576
  webhook:
    retry_policy: [60, 300, 900]
    dlq_topic: plugin.webhook.dlq
  secrets:
    rotation_days_default: 30
  billing:
    tax_provider: stripe_tax
    stripe_tax:
      api_key: "sk_test_xxx"
      account_id: ""
      location: "US"
      api_base_url: "https://api.stripe.com"
      webhook_secret: ""
      timeout_seconds: 15
    avalara:
      account_id: ""
      license_key: ""
      company_code: ""
      environment: "sandbox"
      base_url: "https://sandbox-rest.avatax.com"
      client_id: ""
      client_secret: ""
      timeout_seconds: 15
    reconciliation:
      vendor_share: 0.8
      platform_share: 0.15
      fee_share: 0.05
      currency: "USD"
    async_queue: "marketplace.billing.async"
    http_timeout_seconds: 15
    retry_backoff_seconds: [5, 30, 120]

# Marketplace 模块配置
marketplace:
  checklist:
    graphql_path: "/api/v1/admin/marketplace/checklist/graphql"
    docs_url: "specs/006-marketplace-business/contracts/ready-checklist.graphql"
  documentation:
    overview: "specs/006-marketplace-business/quickstart.md"
    ready_checklist: "specs/006-marketplace-business/contracts/ready-checklist.graphql"
    listing_playbook: "specs/006-marketplace-business/spec.md"
  recommendation:
    enabled: true
    default_weight: 0.0
    experiment_topic: "marketplace.recommendation.experiments"
    frequency_minutes: 60
  license:
    offline_allowance_hours: 72
    cache:
      provider: redis
      redis_url: redis://localhost:6379
      key_prefix: powerx:marketplace:licenses
    reminder:
      lead_hours: 72
      channels: ["email", "in_app"]

# Operations 支持与运维配置
operations:
  support:
    webhook_secret: "replace-me"
    default_channels:
      - channel: "marketplace_ticket"
        address: "https://support.powerx.dev/plugins/base"
        escalates: ["agent", "engineer"]
      - channel: "vendor_email"
        address: "vendor-support@example.com"
        escalates: ["agent", "manager"]
      - channel: "emergency_hotline"
        address: "+1-800-555-0100"
        escalates: ["manager"]
  incident:
    status_page_url: "https://status.powerx.dev/plugins/base"
    security_contacts: ["security@powerx.io"]
    communication_modes: ["support_hub", "status_page", "security_email", "hotline"]
  sla:
    timezone: "UTC"
    daily_cron: "0 5 * * *"
    monthly_cron: "0 6 1 * *"
    quarterly_cron: "0 7 1 1,4,7,10 *"

# gRPC 上游配置（连接 PowerX 核心服务）
grpc_upstream:
  address: "localhost:9001" # PowerX gRPC 服务地址
  token: "" # Capability Token（插件安装后获得）
  tenant_id: 1 # 租户 ID
  use_tls: false # 开发环境关闭 TLS
  ca_cert: "" # TLS 根证书路径（生产环境使用）
  # 连接策略：eager(启动即连)/lazy(首次调用再连)
  connect_mode: "lazy"
  # 可选：true 时连接失败不致命（仅建议开发使用）
  optional: true

# gRPC 服务器配置（插件提供的 gRPC 服务）
grpc_server:
  enable: true # 是否启用插件 gRPC 服务器
  addr: ":9101" # 插件 gRPC 监听地址
  use_tls: false # 开发环境关闭 TLS
  cert: "" # TLS 证书路径（生产环境使用）
  key: "" # TLS 私钥路径（生产环境使用）
