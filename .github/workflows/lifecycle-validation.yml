name: Lifecycle Validation

on:
  pull_request:
    paths:
      - 'docs/lifecycle/**'
      - 'docs/integration/01_plugin_lifecycle/**'
      - 'make-files/manifest.mk'
      - 'make-files/compat.mk'
      - 'make-files/release.mk'
      - 'backend/cmd/manifestcheck/**'
      - 'scripts/**'
      - 'contracts/compatibility.yaml'
      - 'Makefile'
  push:
    branches: [ main ]
    paths:
      - 'docs/lifecycle/**'
      - 'make-files/manifest.mk'
      - 'make-files/compat.mk'
      - 'make-files/release.mk'
      - 'backend/cmd/manifestcheck/**'
      - 'scripts/**'
      - 'contracts/compatibility.yaml'

jobs:
  verify-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: go mod download
        working-directory: ./backend
      - name: Install web-admin deps
        run: npm ci
        working-directory: ./web-admin
      - name: Install compatibility tooling deps
        run: npm install --prefix scripts
      - name: Verify manifest parity
        run: make verify-manifest
      - name: Validate capabilities
        run: make check-capability
      - name: Generate compatibility report
        run: make check-compat

  dry-run-package:
    runs-on: ubuntu-latest
    needs: verify-manifest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        run: go mod download
        working-directory: ./backend
      - name: Install web-admin deps
        run: npm ci
        working-directory: ./web-admin
      - name: Package dry run
        run: make package-pxp
        env:
          PACKAGE_STAGE_ROOT: build/validation
      - name: Upload audit artefacts
        uses: actions/upload-artifact@v4
        with:
          name: pxp-validation
          path: build/validation
