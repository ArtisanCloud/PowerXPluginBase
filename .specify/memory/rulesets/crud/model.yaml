# Model（含多租户字段与审计字段）
kind: ruleset
id: crud_model
version: 1.0.0
checks:
  - id: model-tenant-audit
    desc: 模型包含 tenant_id 与审计字段（created_at/updated_at）
    assert:
      type: schema
      target: backend/internal/domain/model/**
      schema:
        requires:
          - tenant_id
          - created_at
          - updated_at
  - id: model-gorm-json-tags
    desc: 持久化模型必须声明 gorm 列定义与 json 标签
    assert:
      type: grep
      target: backend/internal/domain/models/**
      pattern:
        - "gorm:\""
        - "json:\""
  - id: model-table-constants
    desc: 所有 TableName() 函数必须引用模型常量（backend/internal/domain/models/model.go）
    assert:
      type: grep
      target: backend/internal/domain/models/**
      pattern:
        - "TableName() string"
        - "models.S("
      deny:
        - "models.S(\""
  - id: model-register-migrate
    desc: 所有表结构需在 migrate.go 中通过 AutoMigrate 注册
    assert:
      type: grep
      target: backend/cmd/database/migrate/migrate.go
      pattern:
        - AutoMigrate(
