# Model（含多租户字段与审计字段）
kind: ruleset
id: crud_model
version: 1.0.0
checks:
  - id: model-tenant-audit
    desc: 模型包含 tenant_id 与审计字段（created_at/updated_at）
    assert:
      type: schema
      target: backend/internal/domain/model/**
      schema:
        requires:
          - tenant_id
          - created_at
          - updated_at