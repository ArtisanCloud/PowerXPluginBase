# proto 生成
kind: ruleset
id: crud_proto_gen
version: 1.0.0
checks:
  - id: proto-gen-cmd
    desc: 存在 make proto-gen 或 buf 等效命令
    assert:
      type: grep
      target: Makefile
      pattern:
        - proto-gen
  - id: proto-output
    desc: 生成产物位于 api/grpc/gen/go 或 backend/api/grpc/gen/go
    assert:
      type: path
      target:
        - api/grpc/gen/go/**
        - backend/api/grpc/gen/go/**