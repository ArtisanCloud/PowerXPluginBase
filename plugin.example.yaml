# 示例 manifest，帮助开发者理解每个字段的作用。
# - 将与部署或业务相关的配置（如端口、外部服务地址）抽离到 .env 或 configs/ 下的独立文件。
# - 仅保留插件固定不变的元信息与能力声明，避免硬编码敏感信息。
id: com.powerx.plugins.example
name: Example Plugin
version: 0.1.0
description: "示例插件，演示 Note 能力的定义方式"
corex_version: ">=0.6.0"

runtime:
  kind: process
  entry: backend/bin/plugin
  args:
    - "--config"
    - configs/runtime.yaml # 建议在此文件内读取业务相关配置
  env:
    PX_LOG_LEVEL: ${PX_LOG_LEVEL:-info}
    PX_PLUGIN_PORT: ${PX_PLUGIN_PORT:-8091}
    NOTE_BUCKET: ${PX_NOTE_BUCKET:?请在部署环境设置 NOTE_BUCKET}
  health:
    http: /healthz
    interval: 10s
    timeout: 3s

backend:
  entry: backend/bin/plugin
  port: ${PX_PLUGIN_PORT:-8091}
  health: /healthz

endpoints:
  http_base_path: /api/v1
  grpc:
    enabled: false
    proto_dir: ./backend/contracts/proto

frontend:
  admin:
    kind: static
    static_dir: web-admin/.output/public
    menus:
      - id: "note"
        title: "menu.note"
        icon: i-heroicons-clipboard-document-check
        path: /plugins/note
        order: 20
        slot: group.plugins
        required_policies: ["note:note:read"]
        children:
          - id: "note.notes"
            title: "menu.note.notes"
            icon: i-heroicons-list-bullet
            path: /plugins/note/notes
            order: 1

routes:
  basePath: /v1
  adminManifest: /api/v1/admin/manifest
  rbac: /api/v1/admin/rbac

rbac:
  resources:
    - resource: note:note
      actions: [read, create, update, delete]

permissions:
  - resource: note:note
    actions: [read, create, update, delete]

agents:
  - id: note.assistant
    plugin_id: com.powerx.plugins.example
    name: Note 助理
    description: 处理 Note 相关事务
    default_tools:
      - note.note.create
      - note.note.query

# 工具清单保持纯声明，具体业务参数放到 configs/tools.yaml 供程序读取
# 例如 HTTP endpoint baseURL 可以在运行时通过环境变量注入。
tools:
  - id: note.note.create
    plugin_id: com.powerx.plugins.example
    name: 创建任务
    description: 创建一个新的 Note 任务
    transport: http
    endpoint: ${PX_PLUGIN_HTTP_BASE:-/api/v1}/notes
    method: POST
    rbac_resource: note:note
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: 任务标题
        description:
          type: string
          description: 任务描述
        assignee:
          type: integer
          description: 分配用户 ID
        status:
          type: string
          enum: [todo, in_progress, done]
          description: 任务状态
      required: [title]
    output_schema:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

  - id: note.note.query
    plugin_id: com.powerx.plugins.example
    name: 查询任务
    description: 查询 Note 任务列表
    transport: http
    endpoint: ${PX_PLUGIN_HTTP_BASE:-/api/v1}/notes
    method: GET
    rbac_resource: note:note
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: 按状态过滤
        assignee:
          type: integer
          description: 按分配人过滤
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    output_schema:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              status:
                type: string
              assignee:
                type: integer
              created_at:
                type: string
        pagination:
          type: object

# 事件、工作流等能力根据插件需要打开
# publish/subscribe 的事件名建议统一使用业务域前缀
# 运行时事件消费者配置放到 configs/events.yaml
events:
  publish: [note.created]
  subscribe: [core.user.updated]

workflows:
  - id: note_sync_to_crm
    name: Note 同步 CRM
    description: 当 Note 完成后同步到 CRM

menus:
  - id: plugins.note
    title: menu.note
    icon: i-heroicons-clipboard-document-check
    path: /plugins/note
    order: 20
    required_policies: [note:note:read]

migrations:
  driver: goose
  dir: ./backend/migrations

assets:
  public_dir: ./web-admin/public
  webAdminPath: ./web-admin/.output

checksums:
  package_sha256: "" # 打包后由 CI 写入

signature:
  enabled: false

metadata:
  author: PowerX Team
  category: productivity
  tags: [note, example]
  icon: i-heroicons-clipboard-document
  homepage: https://example.powerx.dev/plugins/note
  license: MIT
